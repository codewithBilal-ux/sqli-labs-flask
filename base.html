<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}SQLi Labs{% endblock %}</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0a0c10;
      --surface:  #111318;
      --border:   #1e2330;
      --accent:   #e63946;
      --green:    #39d353;
      --yellow:   #f7c948;
      --blue:     #58a6ff;
      --muted:    #8b949e;
      --text:     #cdd9e5;
      --heading:  #e6edf3;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ── Nav ── */
    nav {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      gap: 2rem;
      height: 52px;
      position: sticky; top: 0; z-index: 100;
    }
    .nav-logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.1rem;
      color: var(--accent);
      text-decoration: none;
      letter-spacing: -0.02em;
    }
    .nav-logo span { color: var(--heading); }
    nav a {
      color: var(--muted);
      text-decoration: none;
      font-size: 12px;
      transition: color .15s;
    }
    nav a:hover { color: var(--heading); }
    .nav-badge {
      margin-left: auto;
      background: #1a0a0a;
      border: 1px solid var(--accent);
      color: var(--accent);
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 2px;
    }

    /* ── Layout ── */
    .container { max-width: 1100px; margin: 0 auto; padding: 2rem; }

    /* ── Cards ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }
    .card-header {
      display: flex; align-items: center; gap: .75rem;
      margin-bottom: 1rem;
    }
    .card h2 {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 1.1rem;
      color: var(--heading);
    }

    /* ── Lab meta strip ── */
    .lab-meta {
      display: flex; gap: 1rem; flex-wrap: wrap;
      margin-bottom: 1.5rem;
    }
    .tag {
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 3px;
      border: 1px solid;
    }
    .tag-red    { border-color: var(--accent);  color: var(--accent);  background: #1a0808; }
    .tag-green  { border-color: var(--green);   color: var(--green);   background: #061a0d; }
    .tag-yellow { border-color: var(--yellow);  color: var(--yellow);  background: #1a1608; }
    .tag-blue   { border-color: var(--blue);    color: var(--blue);    background: #081020; }

    /* ── SQL display ── */
    .sql-box {
      background: #070910;
      border: 1px solid var(--border);
      border-left: 3px solid var(--yellow);
      border-radius: 4px;
      padding: 1rem 1.25rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--yellow);
      word-break: break-all;
      white-space: pre-wrap;
      margin: .75rem 0;
    }
    .sql-box.safe { border-left-color: var(--green); color: var(--green); }
    .sql-box.error-box { border-left-color: var(--accent); color: var(--accent); }

    /* ── Form elements ── */
    label { display: block; font-size: 11px; color: var(--muted); margin-bottom: .4rem; text-transform: uppercase; letter-spacing: .05em; }
    input[type=text], input[type=password], textarea, select {
      width: 100%;
      background: #070910;
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      padding: .6rem .9rem;
      outline: none;
      transition: border-color .15s;
    }
    input:focus, textarea:focus, select:focus { border-color: var(--blue); }
    .form-row { margin-bottom: 1rem; }

    .btn {
      display: inline-flex; align-items: center; gap: .5rem;
      padding: .55rem 1.25rem;
      border: none; border-radius: 4px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px; font-weight: 600;
      cursor: pointer; transition: opacity .15s;
      text-decoration: none;
    }
    .btn:hover { opacity: .85; }
    .btn-red    { background: var(--accent); color: #fff; }
    .btn-green  { background: #1a4a25; color: var(--green); border: 1px solid var(--green); }
    .btn-ghost  { background: transparent; color: var(--muted); border: 1px solid var(--border); }

    /* ── Results table ── */
    .results-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .results-table th {
      text-align: left; padding: .5rem .75rem;
      color: var(--muted); font-weight: 600; font-size: 10px;
      text-transform: uppercase; letter-spacing: .06em;
      border-bottom: 1px solid var(--border);
    }
    .results-table td {
      padding: .5rem .75rem;
      border-bottom: 1px solid #13161d;
      color: var(--text);
    }
    .results-table tr:hover td { background: #0e1015; }
    .highlight-row td { color: var(--accent) !important; }

    /* ── Payload box ── */
    .payload-block {
      background: #0d0a14;
      border: 1px solid #3d2a6a;
      border-radius: 4px;
      padding: .9rem 1.1rem;
      margin: .75rem 0;
    }
    .payload-block code {
      color: #b48ef7;
      font-size: 12px;
      font-family: 'JetBrains Mono', monospace;
    }

    /* ── Status banner ── */
    .banner { border-radius: 4px; padding: .75rem 1rem; margin-bottom: 1rem; font-size: 12px; }
    .banner-success { background: #061a0d; border: 1px solid var(--green); color: var(--green); }
    .banner-fail    { background: #1a0808; border: 1px solid var(--accent); color: var(--accent); }
    .banner-info    { background: #08121a; border: 1px solid var(--blue); color: var(--blue); }

    /* ── Collapsible hint ── */
    details summary {
      cursor: pointer; color: var(--muted); font-size: 12px;
      list-style: none; display: flex; align-items: center; gap: .5rem;
    }
    details summary::-webkit-details-marker { display: none; }
    details[open] summary { color: var(--yellow); }
    details .hint-body {
      margin-top: .75rem; padding: .75rem 1rem;
      background: #0d0c08;
      border: 1px solid #3a3010;
      border-radius: 4px;
      color: var(--yellow);
      font-size: 12px;
      line-height: 1.7;
    }

    /* ── Breadcrumb ── */
    .breadcrumb { font-size: 11px; color: var(--muted); margin-bottom: 1.5rem; }
    .breadcrumb a { color: var(--muted); text-decoration: none; }
    .breadcrumb a:hover { color: var(--text); }
    .breadcrumb span { margin: 0 .4rem; }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="nav-logo">SQL<span>i</span>Labs</a>
  <a href="/">Home</a>
  {% for i in range(1,9) %}<a href="/lab{{ i }}">Lab {{ i }}</a>{% endfor %}
  <span class="nav-badge">⚠ INTENTIONALLY VULNERABLE</span>
</nav>
<div class="container">
  {% block content %}{% endblock %}
</div>
</body>
</html>
